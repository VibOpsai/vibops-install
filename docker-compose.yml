# VibOps — Production Docker Compose
# Pull pre-built images from GHCR. No source code required.
#
# Quick start:
#   make quickstart
#
# Manual:
#   cp .env.example .env   # edit .env with your settings
#   docker compose up -d
#
# Registry login (required once):
#   echo $VIBOPS_REGISTRY_TOKEN | docker login ghcr.io -u vibops-client --password-stdin

x-vibops-image: &core-image
  image: ghcr.io/vibopsai/core:${VIBOPS_VERSION:-latest}

x-vibops-agent: &agent-image
  image: ghcr.io/vibopsai/agent:${VIBOPS_VERSION:-latest}

x-vibops-console: &console-image
  image: ghcr.io/vibopsai/console:${VIBOPS_VERSION:-latest}

x-vibops-gateway: &gateway-image
  image: ghcr.io/vibopsai/gateway:${VIBOPS_VERSION:-latest}

x-vibops-connect: &connect-image
  image: ghcr.io/vibopsai/connect:${VIBOPS_VERSION:-latest}

x-vibops-llm-proxy: &llm-proxy-image
  image: ghcr.io/vibopsai/llm-proxy:${VIBOPS_VERSION:-latest}

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: vibops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vibops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vibops_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibops -d vibops_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vibops_net

  redis:
    image: redis:7-alpine
    container_name: vibops_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-vibops-dev}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-vibops-dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vibops_net

  # ─── Execution Engine ─────────────────────────────────────────────────────

  core:
    <<: *core-image
    container_name: vibops_core
    restart: unless-stopped
    command: ["api"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vibops:${POSTGRES_PASSWORD}@postgres:5432/vibops_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-vibops-dev}@redis:6379/0
    volumes:
      - ${HOME}/.kube:/root/.kube:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vibops_net

  worker:
    <<: *core-image
    container_name: vibops_worker
    restart: unless-stopped
    command: ["worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vibops:${POSTGRES_PASSWORD}@postgres:5432/vibops_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-vibops-dev}@redis:6379/0
      OLLAMA_URL: http://ollama:11434
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
      DATADOG_APP_KEY: ${DATADOG_APP_KEY:-}
      DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
      SLURM_DEMO_MODE: ${SLURM_DEMO_MODE:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.kube:/root/.kube
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vibops_net

  beat:
    <<: *core-image
    container_name: vibops_beat
    restart: unless-stopped
    command: ["beat"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vibops:${POSTGRES_PASSWORD}@postgres:5432/vibops_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-vibops-dev}@redis:6379/0
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
      DATADOG_APP_KEY: ${DATADOG_APP_KEY:-}
      DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
    depends_on:
      - redis
      - worker
    networks:
      - vibops_net

  # ─── Backup PostgreSQL ───────────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: vibops_backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - backups:/backups
    entrypoint: >
      sh -c '
        while true; do
          STAMP=$$(date -u +%Y-%m-%d);
          DEST=/backups/vibops_$${STAMP}.sql.gz;
          echo "[backup] $$(date -u +%FT%TZ) → $$DEST";
          pg_dump -h postgres -U vibops -d vibops_db | gzip > $$DEST \
            && echo "[backup] done" \
            || echo "[backup] FAILED";
          find /backups -name "vibops_*.sql.gz" -mtime +30 -delete;
          sleep 86400;
        done
      '
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vibops_net

  # ─── Agent ───────────────────────────────────────────────────────────────

  agent:
    <<: *agent-image
    container_name: vibops_agent
    restart: unless-stopped
    env_file: .env
    environment:
      CORE_API_URL: http://core:8000
    ports:
      - "8001:8001"
    volumes:
      - agent_training_data:/app/data/training
    depends_on:
      core:
        condition: service_healthy
    networks:
      - vibops_net

  # ─── Console ─────────────────────────────────────────────────────────────

  console:
    <<: *console-image
    container_name: vibops_console
    restart: unless-stopped
    env_file: .env
    environment:
      CORE_API_URL: http://core:8000
      AGENT_API_URL: http://agent:8001
      OLLAMA_URL: http://ollama:11434
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
      DATADOG_APP_KEY: ${DATADOG_APP_KEY:-}
      DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
      GRAFANA_PUBLIC_URL: ${GRAFANA_PUBLIC_URL:-}
    volumes:
      - console_data:/data
    ports:
      - "8003:8003"
    depends_on:
      core:
        condition: service_healthy
      agent:
        condition: service_started
    networks:
      - vibops_net

  # ─── Ollama (optional — local LLM) ──────────────────────────────────────
  ollama:
    image: ollama/ollama
    container_name: vibops_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Uncomment for GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - vibops_net

  # ─── LLM Inference Proxy ──────────────────────────────────────────────────
  # Transparent OpenAI-compatible proxy that captures inference metrics
  # per agent for FinOps attribution. Agents point here instead of vLLM/Ollama.
  llm-proxy:
    <<: *llm-proxy-image
    container_name: vibops_llm_proxy
    restart: unless-stopped
    environment:
      CORE_API_URL: http://core:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      DEFAULT_BACKEND_URL: http://ollama:11434
    ports:
      - "8004:8004"
    depends_on:
      core:
        condition: service_healthy
    networks:
      - vibops_net

  # ─── Connect Gateway (optional — connect profile) ───────────────────────
  connect:
    <<: *connect-image
    container_name: vibops_connect
    environment:
      VIBOPS_CORE_URL: http://core:8000
      VIBOPS_GATEWAY_ID: ${CONNECT_GATEWAY_ID:-}
      VIBOPS_TOKEN: ${CONNECT_TOKEN:-}
      VIBOPS_POLL_INTERVAL: "15"
    volumes:
      - ${HOME}/.kube:/root/.kube:ro
    depends_on:
      core:
        condition: service_healthy
    networks:
      - vibops_net
    profiles:
      - connect

  # ─── Observability — Prometheus + Grafana ────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: vibops_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - vibops_net

  grafana:
    image: grafana/grafana:latest
    container_name: vibops_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-vibops}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - vibops_net

  # ─── Gateway OpenAI-compatible ──────────────────────────────────────────

  gateway:
    <<: *gateway-image
    container_name: vibops_gateway
    environment:
      AGENT_API_URL: http://agent:8001
    ports:
      - "8002:8002"
    depends_on:
      - agent
    networks:
      - vibops_net

# ─── Volumes & Network ──────────────────────────────────────────────────────

volumes:
  postgres_data:
  ollama_data:
  console_data:
  agent_training_data:
  prometheus_data:
  grafana_data:
  backups:

networks:
  vibops_net:
    driver: bridge
